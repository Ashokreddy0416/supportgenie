name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run linter
        run: uv run ruff check . || true

      - name: Run tests
        run: uv run pytest
        env:
          GROQ_API_KEY: "test-key-not-used-in-mocked-tests"
          JWT_SECRET_KEY: "test-secret-for-ci"
          LANGFUSE_PUBLIC_KEY: ""
          LANGFUSE_SECRET_KEY: ""