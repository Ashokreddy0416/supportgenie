[project]
name = "supportgenie"
version = "0.1.0"
description = "Agentic RAG customer-support copilot"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasets",
    "pandas",
    "sentence-transformers",
    "qdrant-client",
]

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["src/supportgenie"]